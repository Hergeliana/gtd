  <script>
    // IMPORTANT: ensure no duplicate "supabase" declaration anywhere else
    const supabaseClient = window.supabase.createClient(
      "https://fnwmaaoatjbjuteehdjm.supabase.co",
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZud21hYW9hdGpianV0ZWVoZGptIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzMDcxNjksImV4cCI6MjA5MDg4MzE2OX0.fw9LyyK5X-f3UABSU5D_oAvkPquH85q171TGjIvXSu0"
    );

    async function check() {
      try {
        const { data, error } = await supabaseClient.auth.getSession();

        if (error) {
          console.error("Auth error:", error.message);
          window.location.replace("login.html");
          return;
        }

        const user = data?.session?.user;

        if (!user) {
          window.location.replace("login.html");
        } else {
          window.location.replace("index.html");
        }

      } catch (err) {
        console.error("Unexpected error:", err);
        window.location.replace("login.html");
      }
    }

    check();
  </script>
