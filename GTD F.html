<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>GTD - Getting Things Done</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:Georgia,serif;background:#f5f0e8;color:#2c2416;}
input,select,button{font-family:inherit;}
::-webkit-scrollbar{width:6px;}
::-webkit-scrollbar-track{background:#f5f0e8;}
::-webkit-scrollbar-thumb{background:#c8a96e;border-radius:3px;}
input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const{useState,useEffect,useRef}=React;

const CONTEXTS=["@anywhere","@computer","@home","@errands","@calls","@waiting"];
const SECTIONS=["inbox","twomin","defer","delegate","projects","someday","reference","trash"];
const sectionLabels={inbox:"In Basket",twomin:"Less than 2min",defer:"Defer",delegate:"Delegate",projects:"Projects",someday:"Someday / Maybe",reference:"Reference",trash:"Trash",review:"Weekly Review",calendar:"Calendar"};
const DAYS=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
const MONTHS=["January","February","March","April","May","June","July","August","September","October","November","December"];
const TASK_SECTIONS=["twomin","defer","delegate","someday","reference"];
const sectionColor={twomin:"#c8a96e",defer:"#6e9dc8",delegate:"#9d6ec8",someday:"#8a7a65",reference:"#5a8a5a",trash:"#e07050"};
const excludedSections=["someday","reference","trash"];

function getDaysInMonth(y,m){return new Date(y,m+1,0).getDate();}
function toDateStr(y,m,d){return `${y}-${String(m+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;}
const emptyEdit=()=>({text:"",section:"defer",context:"@anywhere",project:"",due:"",time:"",done:false});
const fieldStyle={width:"100%",padding:"8px 10px",borderRadius:6,border:"1px solid #d4c5a9",background:"#f5f0e8",fontSize:13,fontFamily:"sans-serif",outline:"none",boxSizing:"border-box"};
const labelStyle={fontSize:11,fontFamily:"sans-serif",color:"#8a7a65",marginBottom:4,display:"block",textTransform:"uppercase",letterSpacing:0.5};
const mkBtn=(bg,color,extra)=>({padding:"8px 16px",background:bg,color:color||"#f5f0e8",border:"none",borderRadius:7,cursor:"pointer",fontSize:13,fontFamily:"sans-serif",...(extra||{})});

function fmt12(t){
  if(!t)return null;
  const[h,m]=t.split(":").map(Number);
  const ap=h>=12?"PM":"AM",hh=h%12||12;
  return `${hh}:${String(m).padStart(2,"0")} ${ap}`;
}

function duration(item){return(item.twoMin||item.section==="twomin")?2:30;}
function overlaps(a,b){
  if(!a.time||!b.time)return false;
  const toMin=t=>{const[h,m]=t.split(":").map(Number);return h*60+m;};
  const aS=toMin(a.time),aE=aS+duration(a),bS=toMin(b.time),bE=bS+duration(b);
  return aS<bE&&bS<aE;
}
function getConflicts(items){
  const conflicts=new Set();
  const timed=items.filter(i=>i.time&&!i.done);
  for(let i=0;i<timed.length;i++)
    for(let j=i+1;j<timed.length;j++)
      if(overlaps(timed[i],timed[j])){conflicts.add(timed[i].id);conflicts.add(timed[j].id);}
  return conflicts;
}

function TimePicker({value,onChange}){
  const[open,setOpen]=useState(false);
  const[h,m]=value?value.split(":").map(Number):[9,0];
  const hasVal=!!value;
  const setTime=(nh,nm)=>onChange(`${String(((nh%24)+24)%24).padStart(2,"0")}:${String(((nm%60)+60)%60).padStart(2,"0")}`);
  const displayVal=hasVal?(()=>{const ap=h>=12?"PM":"AM",hh=h%12||12;return `${hh}:${String(m).padStart(2,"0")} ${ap}`;})():"";
  const hours12=Array(12).fill(null).map((_,i)=>i+1);
  const minutes=Array(60).fill(null).map((_,i)=>i);
  const curH12=(h%12)||12;
  const curAP=h>=12?"PM":"AM";

  function HourList(){
    const ref=useRef(null);
    useEffect(()=>{if(ref.current){const idx=hours12.indexOf(curH12);if(idx>=0)ref.current.children[idx].scrollIntoView({block:"center",behavior:"auto"});}},[]);
    const scroll=dir=>{
      const idx=hours12.indexOf(curH12);
      const next=hours12[(idx+dir+12)%12];
      const newH=curAP==="AM"?(next===12?0:next):(next===12?12:next+12);
      setTime(newH,m);
      setTimeout(()=>ref.current&&ref.current.children[hours12.indexOf(next)]&&ref.current.children[hours12.indexOf(next)].scrollIntoView({block:"center",behavior:"smooth"}),0);
    };
    return(
      <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
        <div style={{fontSize:10,fontFamily:"sans-serif",color:"#8a7a65",textTransform:"uppercase",letterSpacing:0.5,marginBottom:2}}>Hour</div>
        <button type="button" onClick={()=>scroll(-1)} style={{width:52,padding:"3px 0",background:"#e8dfd0",border:"1px solid #d4c5a9",borderRadius:5,cursor:"pointer",fontSize:12}}>up</button>
        <div ref={ref} style={{height:120,overflowY:"auto",width:52,scrollbarWidth:"thin",border:"1px solid #e8dfd0",borderRadius:6,background:"#faf7f0"}}>
          {hours12.map(hv=>(
            <div key={hv} onClick={()=>{const newH=curAP==="AM"?(hv===12?0:hv):(hv===12?12:hv+12);setTime(newH,m);}}
              style={{padding:"6px 0",textAlign:"center",fontFamily:"sans-serif",fontSize:14,cursor:"pointer",background:curH12===hv?"#2c2416":"transparent",color:curH12===hv?"#f5f0e8":"#2c2416",fontWeight:curH12===hv?"bold":"normal"}}>
              {String(hv).padStart(2,"0")}
            </div>
          ))}
        </div>
        <button type="button" onClick={()=>scroll(1)} style={{width:52,padding:"3px 0",background:"#e8dfd0",border:"1px solid #d4c5a9",borderRadius:5,cursor:"pointer",fontSize:12}}>dn</button>
      </div>
    );
  }

  function MinList(){
    const ref=useRef(null);
    useEffect(()=>{if(ref.current){const idx=minutes.indexOf(m%60);if(idx>=0)ref.current.children[idx].scrollIntoView({block:"center",behavior:"auto"});}},[]);
    const curM=m%60;
    const scroll=dir=>{
      const idx=minutes.indexOf(curM);
      const next=minutes[(idx+dir+60)%60];
      setTime(h,next);
      setTimeout(()=>ref.current&&ref.current.children[minutes.indexOf(next)]&&ref.current.children[minutes.indexOf(next)].scrollIntoView({block:"center",behavior:"smooth"}),0);
    };
    return(
      <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
        <div style={{fontSize:10,fontFamily:"sans-serif",color:"#8a7a65",textTransform:"uppercase",letterSpacing:0.5,marginBottom:2}}>Min</div>
        <button type="button" onClick={()=>scroll(-1)} style={{width:52,padding:"3px 0",background:"#e8dfd0",border:"1px solid #d4c5a9",borderRadius:5,cursor:"pointer",fontSize:12}}>up</button>
        <div ref={ref} style={{height:120,overflowY:"auto",width:52,scrollbarWidth:"thin",border:"1px solid #e8dfd0",borderRadius:6,background:"#faf7f0"}}>
          {minutes.map(mv=>(
            <div key={mv} onClick={()=>setTime(h,mv)}
              style={{padding:"6px 0",textAlign:"center",fontFamily:"sans-serif",fontSize:14,cursor:"pointer",background:curM===mv?"#2c2416":"transparent",color:curM===mv?"#f5f0e8":"#2c2416",fontWeight:curM===mv?"bold":"normal"}}>
              {String(mv).padStart(2,"0")}
            </div>
          ))}
        </div>
        <button type="button" onClick={()=>scroll(1)} style={{width:52,padding:"3px 0",background:"#e8dfd0",border:"1px solid #d4c5a9",borderRadius:5,cursor:"pointer",fontSize:12}}>dn</button>
      </div>
    );
  }

  return(
    <div style={{position:"relative"}}>
      <div style={{display:"flex",alignItems:"center",gap:6}}>
        <div onClick={()=>setOpen(o=>!o)} style={{...fieldStyle,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"space-between",userSelect:"none"}}>
          <span style={{color:hasVal?"#2c2416":"#a89070"}}>{displayVal||"Select time..."}</span>
          <span>&#128336;</span>
        </div>
        {hasVal&&<button type="button" onClick={()=>{onChange("");setOpen(false);}} style={{width:26,height:26,background:"#f5f0e8",border:"1px solid #d4c5a9",borderRadius:5,cursor:"pointer",fontSize:13,color:"#8a7a65"}}>x</button>}
      </div>
      {open&&(
        <div style={{position:"absolute",zIndex:300,top:"calc(100% + 6px)",left:0,background:"#fffdf7",border:"1px solid #d4c5a9",borderRadius:10,boxShadow:"0 6px 24px rgba(0,0,0,0.18)",padding:16,minWidth:200}}>
          <div style={{display:"flex",gap:10,alignItems:"flex-start"}}>
            <HourList/>
            <div style={{fontSize:20,fontWeight:"bold",color:"#c8a96e",paddingTop:52}}>:</div>
            <MinList/>
            <div style={{display:"flex",flexDirection:"column",gap:6,paddingTop:30}}>
              {["AM","PM"].map(ap=>(
                <button key={ap} type="button" onClick={()=>{
                  if(!hasVal)setTime(ap==="AM"?9:21,0);
                  else{let nh=h%12;if(ap==="PM")nh=nh===0?12:nh+12;setTime(nh,m);}
                }} style={{width:42,padding:"7px 0",border:`2px solid ${curAP===ap?"#2c2416":"#d4c5a9"}`,borderRadius:6,background:curAP===ap?"#2c2416":"#f5f0e8",color:curAP===ap?"#f5f0e8":"#2c2416",cursor:"pointer",fontSize:13,fontFamily:"sans-serif",fontWeight:"bold"}}>
                  {ap}
                </button>
              ))}
            </div>
          </div>
          <div style={{marginTop:12,display:"flex",justifyContent:"flex-end"}}>
            <button type="button" onClick={()=>setOpen(false)} style={{padding:"6px 18px",background:"#2c2416",color:"#f5f0e8",border:"none",borderRadius:6,cursor:"pointer",fontSize:13,fontFamily:"sans-serif"}}>Done</button>
          </div>
        </div>
      )}
    </div>
  );
}

function EditFields({form,setForm,showSection,projects}){
  return(
    <React.Fragment>
      <div style={{marginBottom:12}}>
        <label style={labelStyle}>Task name</label>
        <input value={form.text} onChange={e=>setForm(f=>({...f,text:e.target.value}))} style={{...fieldStyle,fontFamily:"Georgia,serif",fontSize:14,padding:"10px 12px"}}/>
      </div>
      {showSection&&(
        <div style={{marginBottom:12}}>
          <label style={labelStyle}>Folder</label>
          <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
            {TASK_SECTIONS.map(s=>(
              <button key={s} onClick={()=>setForm(f=>({...f,section:s}))}
                style={{padding:"6px 12px",border:`2px solid ${form.section===s?"#2c2416":"#d4c5a9"}`,borderRadius:6,background:form.section===s?"#2c2416":"#f5f0e8",color:form.section===s?"#f5f0e8":"#2c2416",cursor:"pointer",fontSize:12,fontFamily:"sans-serif"}}>
                {sectionLabels[s]}
              </button>
            ))}
          </div>
        </div>
      )}
      <div style={{display:"flex",gap:12,marginBottom:12}}>
        <div style={{flex:1}}>
          <label style={labelStyle}>Context</label>
          <select value={form.context} onChange={e=>setForm(f=>({...f,context:e.target.value}))} style={fieldStyle}>
            {CONTEXTS.map(c=><option key={c}>{c}</option>)}
          </select>
        </div>
        <div style={{flex:1}}>
          <label style={labelStyle}>Project</label>
          <input value={form.project||""} onChange={e=>setForm(f=>({...f,project:e.target.value}))} list="proj-list2" placeholder="Assign project..." style={fieldStyle}/>
          <datalist id="proj-list2">{projects.map(p=><option key={p.id} value={p.name}/>)}</datalist>
        </div>
      </div>
      <div style={{display:"flex",gap:12,marginBottom:4}}>
        <div style={{flex:1}}>
          <label style={labelStyle}>Due date (optional)</label>
          <input type="date" value={form.due||""} onChange={e=>setForm(f=>({...f,due:e.target.value}))} style={fieldStyle}/>
        </div>
        <div style={{flex:1}}>
          <label style={labelStyle}>Time (optional)</label>
          <TimePicker value={form.time||""} onChange={t=>setForm(f=>({...f,time:t}))}/>
        </div>
      </div>
    </React.Fragment>
  );
}

function App(){
  const[view,setView]=useState("inbox");
  const[data,setData]=useState({items:[],projects:[],nextId:1});
  const[input,setInput]=useState("");
  const[clarifyItem,setClarifyItem]=useState(null);
  const[clarify,setClarify]=useState({});
  const[editItem,setEditItem]=useState(null);
  const[editForm,setEditForm]=useState(emptyEdit());
  const[newProject,setNewProject]=useState("");
  const[expandedProject,setExpandedProject]=useState(null);
  const[addTaskModal,setAddTaskModal]=useState(null);
  const[taskForm,setTaskForm]=useState({text:"",section:"defer",context:"@anywhere",project:"",due:"",time:""});
  const[toast,setToast]=useState(null);
  const today=new Date();
  const[calYear,setCalYear]=useState(today.getFullYear());
  const[calMonth,setCalMonth]=useState(today.getMonth());
  const[calDay,setCalDay]=useState(null);
  const[calMode,setCalMode]=useState("month");
  const[weekStart,setWeekStart]=useState(()=>{const d=new Date();d.setDate(d.getDate()-d.getDay());return d;});

  useEffect(()=>{try{const s=localStorage.getItem("gtd-data4");if(s)setData(JSON.parse(s));}catch{}},[]);
  useEffect(()=>{try{localStorage.setItem("gtd-data4",JSON.stringify(data));}catch{}},[data]);

  const showToast=msg=>{setToast(msg);setTimeout(()=>setToast(null),2500);};

  const exportData=()=>{
    try{
      const json=JSON.stringify(data,null,2);
      const uri="data:application/json;charset=utf-8,"+encodeURIComponent(json);
      const a=document.createElement("a");
      a.href=uri;a.download="gtd-backup-"+new Date().toISOString().slice(0,10)+".json";
      document.body.appendChild(a);a.click();document.body.removeChild(a);
      showToast("Backup exported!");
    }catch(e){showToast("Export failed.");}
  };

  const importData=e=>{
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const parsed=JSON.parse(ev.target.result);
        if(parsed.items&&parsed.projects&&parsed.nextId){setData(parsed);showToast("Backup imported!");}
        else showToast("Invalid backup file.");
      }catch{showToast("Failed to read file.");}
    };
    reader.readAsText(file);e.target.value="";
  };

  const addToInbox=()=>{
    if(!input.trim())return;
    const id=data.nextId;
    setData(d=>({...d,nextId:d.nextId+1,items:[...d.items,{id,text:input.trim(),section:"inbox",context:"@anywhere",project:null,due:null,time:null,twoMin:false,done:false,created:Date.now()}]}));
    setInput("");showToast("Captured to In Basket!");
  };

  const openClarify=item=>{setClarifyItem(item);setClarify({actionable:null,twoMin:false,context:item.context||"@anywhere",project:item.project||"",due:item.due||"",time:item.time||"",destination:"defer",text:item.text,naSection:"reference"});};
  const applyClarify=()=>{
    const{actionable,twoMin,context,project,due,time,destination,text,naSection}=clarify;
    if(actionable===null)return;
    const section=actionable?(twoMin?"twomin":destination):naSection;
    setData(d=>({...d,items:d.items.map(i=>i.id===clarifyItem.id?{...i,text,section,context,project:project||null,due:due||null,time:time||null,twoMin,done:false}:i)}));
    setClarifyItem(null);showToast("Moved to "+sectionLabels[section]);
  };

  const openEdit=item=>{setEditItem(item);setEditForm({text:item.text,section:item.section,context:item.context||"@anywhere",project:item.project||"",due:item.due||"",time:item.time||"",done:item.done});};
  const applyEdit=()=>{
    setData(d=>({...d,items:d.items.map(i=>i.id===editItem.id?{...i,...editForm,project:editForm.project||null,due:editForm.due||null,time:editForm.time||null}:i)}));
    setEditItem(null);showToast("Item updated!");
  };

  const moveItem=(id,section)=>setData(d=>({...d,items:d.items.map(i=>i.id===id?{...i,section}:i)}));
  const toggleDone=id=>setData(d=>({...d,items:d.items.map(i=>i.id===id?{...i,done:!i.done}:i)}));
  const deleteItem=id=>setData(d=>({...d,items:d.items.filter(i=>i.id!==id)}));

  const addProject=()=>{
    if(!newProject.trim())return;
    const id=data.nextId;
    setData(d=>({...d,projects:[...d.projects,{id,name:newProject.trim()}],nextId:d.nextId+1}));
    setNewProject("");setExpandedProject(id);
  };
  const deleteProject=pid=>{
    const pname=data.projects.find(p=>p.id===pid)?.name;
    setData(d=>({...d,projects:d.projects.filter(p=>p.id!==pid),items:d.items.map(i=>i.project===pname?{...i,project:null}:i)}));
  };
  const openAddTask=pid=>{
    const proj=data.projects.find(p=>p.id===pid);
    setAddTaskModal(pid);setTaskForm({text:"",section:"defer",context:"@anywhere",project:proj?.name||"",due:"",time:""});
  };
  const applyAddTask=()=>{
    if(!taskForm.text.trim())return;
    const proj=data.projects.find(p=>p.id===addTaskModal);if(!proj)return;
    const id=data.nextId;
    setData(d=>({...d,nextId:d.nextId+1,items:[...d.items,{id,text:taskForm.text.trim(),section:taskForm.section,context:taskForm.context,project:proj.name,due:taskForm.due||null,time:taskForm.time||null,twoMin:taskForm.section==="twomin",done:false,created:Date.now()}]}));
    setAddTaskModal(null);showToast("Task added to "+proj.name);
  };

  const isOverdue=due=>due&&new Date(due)<new Date(new Date().toDateString());
  const isDueSoon=due=>{if(!due)return false;const d=new Date(due),now=new Date();return d>=new Date(now.toDateString())&&d<=new Date(now.getTime()+2*86400000);};
  const sortByTime=arr=>[...arr].sort((a,b)=>{if(a.time&&b.time)return a.time.localeCompare(b.time);if(a.time)return -1;if(b.time)return 1;return 0;});
  const itemsForDay=ds=>sortByTime(data.items.filter(i=>i.due===ds&&i.section!=="trash"));

  const inboxItems=data.items.filter(i=>i.section==="inbox");
  const viewItems=["projects","calendar"].includes(view)?[]:sortByTime(data.items.filter(i=>i.section===view));
  const totalDone=data.items.filter(i=>i.done&&!excludedSections.includes(i.section)).length;
  const totalActive=data.items.filter(i=>!i.done&&!excludedSections.includes(i.section)).length;
  const progress=totalActive+totalDone>0?Math.round((totalDone/(totalActive+totalDone))*100):0;
  const stats={
    inbox:inboxItems.length,
    twomin:data.items.filter(i=>i.section==="twomin"&&!i.done).length,
    defer:data.items.filter(i=>i.section==="defer"&&!i.done).length,
    delegate:data.items.filter(i=>i.section==="delegate"&&!i.done).length
  };

  const daysInMonth=getDaysInMonth(calYear,calMonth);
  const firstDay=new Date(calYear,calMonth,1).getDay();
  const todayStr=toDateStr(today.getFullYear(),today.getMonth(),today.getDate());
  const selectedDayItems=calDay?itemsForDay(calDay):[];
  const selectedDayConflicts=calDay?getConflicts(selectedDayItems):new Set();
  const allConflictIds=new Set();
  const byDate={};
  data.items.filter(i=>i.due&&i.section!=="trash").forEach(i=>{if(!byDate[i.due])byDate[i.due]=[];byDate[i.due].push(i);});
  Object.values(byDate).forEach(di=>{getConflicts(di).forEach(id=>allConflictIds.add(id));});

  function MetaRow({item,conflict}){
    const hasDate=item.due||item.time;
    return(
      <div style={{fontSize:11,color:"#8a7a65",marginTop:3,fontFamily:"sans-serif",display:"flex",gap:8,flexWrap:"wrap",alignItems:"center"}}>
        {item.context&&item.context!=="@anywhere"&&<span>{item.context}</span>}
        {item.project&&<span>{"[P] "+item.project}</span>}
        {hasDate&&(
          <span style={{display:"inline-flex",alignItems:"center",gap:3,color:conflict?"#d04020":isOverdue(item.due)?"#e07050":isDueSoon(item.due)?"#b07820":"#8a7a65",fontWeight:conflict?"bold":"normal"}}>
            {conflict&&<span>{"(!)"}</span>}
            {item.due&&<span>{item.due}</span>}
            {item.time&&<span style={{background:conflict?"#fde8e0":"#e8dfd0",borderRadius:4,padding:"1px 5px",color:conflict?"#d04020":"#5a4a3a"}}>{fmt12(item.time)}</span>}
          </span>
        )}
      </div>
    );
  }

  function ItemCard({item,showCheck,conflict}){
    return(
      <div style={{background:item.done?"#f0ebe0":conflict?"#fff5f3":"#fffdf7",border:"1px solid "+(conflict?"#e07050":isOverdue(item.due)?"#e07050":isDueSoon(item.due)?"#c8a96e":"#d4c5a9"),borderRadius:8,padding:"11px 14px",marginBottom:8,display:"flex",alignItems:"center",gap:10,opacity:item.done?0.65:1}}>
        {showCheck&&<input type="checkbox" checked={item.done} onChange={()=>toggleDone(item.id)} style={{width:17,height:17,cursor:"pointer",accentColor:"#2c2416",flexShrink:0}}/>}
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontSize:14,textDecoration:item.done?"line-through":"none",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
            {item.twoMin&&<span style={{fontSize:10,background:"#c8a96e",color:"#2c2416",borderRadius:3,padding:"1px 5px",marginRight:5,fontFamily:"sans-serif"}}>2MIN</span>}
            {item.text}
          </div>
          <MetaRow item={item} conflict={conflict}/>
        </div>
        <div style={{display:"flex",gap:5,flexShrink:0}}>
          <button onClick={()=>openEdit(item)} style={mkBtn("#e8dfd0","#2c2416",{padding:"5px 10px",fontSize:12})}>Edit</button>
          {view!=="trash"&&<button onClick={()=>moveItem(item.id,"trash")} style={mkBtn("#e8dfd0","#2c2416",{padding:"5px 10px",fontSize:12})}>Del</button>}
          {view==="trash"&&<button onClick={()=>deleteItem(item.id)} style={mkBtn("#e07050",null,{padding:"5px 10px",fontSize:12})}>Delete</button>}
        </div>
      </div>
    );
  }

  const navSections=[...SECTIONS,"calendar","review"];
  const sectionIcons={inbox:"[IN]",twomin:"[2m]",defer:"[DF]",delegate:"[DL]",projects:"[PR]",someday:"[SD]",reference:"[RF]",trash:"[TR]",calendar:"[CA]",review:"[RV]"};

  return(
    <div style={{display:"flex",minHeight:"100vh",fontFamily:"Georgia,serif",background:"#f5f0e8",color:"#2c2416"}}>
      {/* Sidebar */}
      <div style={{width:220,background:"#2c2416",color:"#f5f0e8",padding:"24px 0",display:"flex",flexDirection:"column",flexShrink:0,position:"sticky",top:0,height:"100vh",overflowY:"auto"}}>
        <div style={{padding:"0 20px 20px",borderBottom:"1px solid #4a3c2a"}}>
          <div style={{fontSize:20,fontWeight:"bold",letterSpacing:1}}>GTD</div>
          <div style={{fontSize:11,color:"#a89070",marginTop:4}}>Getting Things Done</div>
        </div>
        <div style={{padding:"12px 0",flex:1}}>
          {navSections.map(s=>(
            <div key={s} onClick={()=>setView(s)} style={{padding:"10px 20px",cursor:"pointer",background:view===s?"#4a3c2a":"transparent",borderLeft:view===s?"3px solid #c8a96e":"3px solid transparent",fontSize:14,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <span>{sectionLabels[s]}</span>
              {s==="inbox"&&stats.inbox>0&&<span style={{background:"#c8a96e",color:"#2c2416",borderRadius:10,fontSize:11,padding:"1px 7px",fontFamily:"sans-serif"}}>{stats.inbox}</span>}
              {s==="twomin"&&stats.twomin>0&&<span style={{background:"#e07050",color:"#fff",borderRadius:10,fontSize:11,padding:"1px 7px",fontFamily:"sans-serif"}}>{stats.twomin}</span>}
              {s==="defer"&&stats.defer>0&&<span style={{background:"#6e9dc8",color:"#fff",borderRadius:10,fontSize:11,padding:"1px 7px",fontFamily:"sans-serif"}}>{stats.defer}</span>}
              {s==="delegate"&&stats.delegate>0&&<span style={{background:"#9d6ec8",color:"#fff",borderRadius:10,fontSize:11,padding:"1px 7px",fontFamily:"sans-serif"}}>{stats.delegate}</span>}
            </div>
          ))}
        </div>
        <div style={{padding:"12px 20px",borderTop:"1px solid #4a3c2a",display:"flex",flexDirection:"column",gap:6}}>
          <button onClick={exportData} style={{padding:"8px",background:"#4a3c2a",color:"#c8a96e",border:"1px solid #6a5c2a",borderRadius:6,cursor:"pointer",fontSize:12,fontFamily:"sans-serif",textAlign:"left"}}>
            Export Backup
          </button>
          <label style={{padding:"8px",background:"#4a3c2a",color:"#a89070",border:"1px solid #6a5c4a",borderRadius:6,cursor:"pointer",fontSize:12,fontFamily:"sans-serif",textAlign:"left"}}>
            Import Backup
            <input type="file" accept=".json" onChange={importData} style={{display:"none"}}/>
          </label>
        </div>
        <div style={{padding:"16px 20px",borderTop:"1px solid #4a3c2a"}}>
          <div style={{fontSize:11,color:"#a89070",marginBottom:6,fontFamily:"sans-serif"}}>OVERALL PROGRESS</div>
          <div style={{background:"#4a3c2a",borderRadius:4,height:6,overflow:"hidden"}}>
            <div style={{width:progress+"%",background:"#c8a96e",height:"100%",transition:"width 0.4s"}}/>
          </div>
          <div style={{fontSize:11,color:"#a89070",marginTop:5,fontFamily:"sans-serif"}}>{totalDone} done / {totalActive} active</div>
        </div>
      </div>

      {/* Main */}
      <div style={{flex:1,padding:"32px 40px",maxWidth:900,overflowY:"auto"}}>
        <div style={{display:"flex",gap:10,marginBottom:32}}>
          <input value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addToInbox()} placeholder="Capture a thought, task, or idea..."
            style={{flex:1,padding:"12px 16px",borderRadius:8,border:"2px solid #d4c5a9",background:"#fffdf7",fontSize:15,fontFamily:"Georgia,serif",outline:"none"}}/>
          <button onClick={addToInbox} style={mkBtn("#2c2416",null,{padding:"12px 22px",fontSize:14})}>Capture</button>
        </div>

        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:20,borderBottom:"2px solid #d4c5a9",paddingBottom:10}}>
          <h2 style={{margin:0,fontSize:22,fontWeight:"normal"}}>{sectionLabels[view]}</h2>
          {view==="calendar"&&(
            <div style={{display:"flex",gap:6}}>
              {["month","week"].map(md=>(
                <button key={md} onClick={()=>setCalMode(md)}
                  style={{padding:"5px 14px",border:"2px solid "+(calMode===md?"#2c2416":"#d4c5a9"),borderRadius:6,background:calMode===md?"#2c2416":"#f5f0e8",color:calMode===md?"#f5f0e8":"#2c2416",cursor:"pointer",fontSize:12,fontFamily:"sans-serif"}}>
                  {md==="month"?"Month":"Week"}
                </button>
              ))}
            </div>
          )}
        </div>

        {/* IN BASKET */}
        {view==="inbox"&&(
          <div>
            {inboxItems.length===0&&<p style={{color:"#8a7a65",fontStyle:"italic"}}>Your basket is empty. Capture something above!</p>}
            {inboxItems.map(item=>(
              <div key={item.id} style={{background:"#fffdf7",border:"1px solid #d4c5a9",borderRadius:8,padding:"13px 16px",marginBottom:10,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <span style={{fontSize:15}}>{item.text}</span>
                <div style={{display:"flex",gap:8}}>
                  <button onClick={()=>openClarify(item)} style={mkBtn("#c8a96e","#2c2416")}>Clarify</button>
                  <button onClick={()=>openEdit(item)} style={mkBtn("#e8dfd0","#2c2416")}>Edit</button>
                  <button onClick={()=>moveItem(item.id,"trash")} style={mkBtn("#e8dfd0","#2c2416")}>Del</button>
                </div>
              </div>
            ))}
          </div>
        )}

        {/* LIST VIEWS */}
        {["twomin","defer","delegate","someday","reference","trash"].includes(view)&&(
          <div>
            {viewItems.length===0&&<p style={{color:"#8a7a65",fontStyle:"italic"}}>Nothing here yet.</p>}
            {viewItems.map(item=><ItemCard key={item.id} item={item} showCheck={["twomin","defer","delegate"].includes(view)} conflict={allConflictIds.has(item.id)}/>)}
          </div>
        )}

        {/* PROJECTS */}
        {view==="projects"&&(
          <div>
            <div style={{display:"flex",gap:10,marginBottom:24}}>
              <input value={newProject} onChange={e=>setNewProject(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addProject()} placeholder="New project name..."
                style={{flex:1,padding:"10px 14px",borderRadius:7,border:"1px solid #d4c5a9",background:"#fffdf7",fontSize:14,fontFamily:"Georgia,serif",outline:"none"}}/>
              <button onClick={addProject} style={mkBtn("#2c2416",null,{padding:"10px 18px"})}>Add Project</button>
            </div>
            {data.projects.length===0&&<p style={{color:"#8a7a65",fontStyle:"italic"}}>No projects yet.</p>}
            {data.projects.map(p=>{
              const tasks=data.items.filter(i=>i.project===p.name&&i.section!=="trash");
              const done=tasks.filter(i=>i.done).length;
              const isOpen=expandedProject===p.id;
              const grouped={};
              tasks.forEach(t=>{if(!grouped[t.section])grouped[t.section]=[];grouped[t.section].push(t);});
              return(
                <div key={p.id} style={{background:"#fffdf7",border:"1px solid #d4c5a9",borderRadius:10,marginBottom:14,overflow:"hidden"}}>
                  <div style={{padding:"14px 18px",display:"flex",alignItems:"center",gap:12,cursor:"pointer"}} onClick={()=>setExpandedProject(isOpen?null:p.id)}>
                    <span style={{fontSize:16,flex:1}}>[P] {p.name}</span>
                    <span style={{fontSize:12,color:"#8a7a65",fontFamily:"sans-serif"}}>{done}/{tasks.length} done</span>
                    {tasks.length>0&&<div style={{width:80,background:"#e8dfd0",borderRadius:4,height:5,overflow:"hidden"}}><div style={{width:(tasks.length?(done/tasks.length)*100:0)+"%",background:"#c8a96e",height:"100%"}}/></div>}
                    <span style={{fontSize:12,color:"#8a7a65"}}>{isOpen?"^":"v"}</span>
                  </div>
                  {isOpen&&(
                    <div style={{borderTop:"1px solid #e8dfd0",padding:"14px 18px"}}>
                      {tasks.length===0&&<p style={{color:"#8a7a65",fontStyle:"italic",fontSize:13,marginBottom:12}}>No tasks yet.</p>}
                      {Object.entries(grouped).map(([sec,secTasks])=>(
                        <div key={sec} style={{marginBottom:14}}>
                          <div style={{fontSize:11,fontFamily:"sans-serif",fontWeight:"bold",color:sectionColor[sec]||"#8a7a65",marginBottom:6,textTransform:"uppercase",letterSpacing:0.5}}>{sectionLabels[sec]}</div>
                          {sortByTime(secTasks).map(item=>(
                            <div key={item.id} style={{background:item.done?"#f0ebe0":allConflictIds.has(item.id)?"#fff5f3":"#f9f6f0",border:"1px solid "+(allConflictIds.has(item.id)?"#e07050":"#e8dfd0"),borderRadius:7,padding:"9px 12px",marginBottom:6,display:"flex",alignItems:"center",gap:8}}>
                              <input type="checkbox" checked={item.done} onChange={()=>toggleDone(item.id)} style={{width:15,height:15,cursor:"pointer",accentColor:"#2c2416",flexShrink:0}}/>
                              <div style={{flex:1,minWidth:0}}>
                                <div style={{fontSize:13,textDecoration:item.done?"line-through":"none",opacity:item.done?0.5:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{item.text}</div>
                                <MetaRow item={item} conflict={allConflictIds.has(item.id)}/>
                              </div>
                              <button onClick={()=>openEdit(item)} style={mkBtn("#e8dfd0","#2c2416",{padding:"4px 8px",fontSize:11})}>Edit</button>
                              <button onClick={()=>moveItem(item.id,"trash")} style={mkBtn("#e8dfd0","#2c2416",{padding:"4px 8px",fontSize:11})}>Del</button>
                            </div>
                          ))}
                        </div>
                      ))}
                      <button onClick={()=>openAddTask(p.id)} style={mkBtn("#2c2416",null,{padding:"8px 16px",fontSize:13,marginTop:4})}>+ Add Task</button>
                      <button onClick={()=>deleteProject(p.id)} style={mkBtn("#e8dfd0","#c04030",{padding:"8px 14px",fontSize:13,marginTop:4,marginLeft:8})}>Delete Project</button>
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        )}

        {/* CALENDAR MONTH */}
        {view==="calendar"&&calMode==="month"&&(
          <div style={{display:"flex",gap:28,flexWrap:"wrap"}}>
            <div style={{flex:"0 0 310px"}}>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}>
                <button onClick={()=>{if(calMonth===0){setCalMonth(11);setCalYear(y=>y-1);}else setCalMonth(m=>m-1);}} style={mkBtn("#e8dfd0","#2c2416",{padding:"6px 12px"})}>Prev</button>
                <span style={{fontWeight:"bold",fontSize:16,fontFamily:"sans-serif"}}>{MONTHS[calMonth]+" "+calYear}</span>
                <button onClick={()=>{if(calMonth===11){setCalMonth(0);setCalYear(y=>y+1);}else setCalMonth(m=>m+1);}} style={mkBtn("#e8dfd0","#2c2416",{padding:"6px 12px"})}>Next</button>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:3,marginBottom:6}}>
                {DAYS.map(d=><div key={d} style={{textAlign:"center",fontSize:11,fontFamily:"sans-serif",color:"#8a7a65",fontWeight:"bold",padding:"4px 0"}}>{d}</div>)}
              </div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:3}}>
                {Array(firstDay).fill(null).map((_,i)=><div key={"e"+i}/>)}
                {Array(daysInMonth).fill(null).map((_,i)=>{
                  const d=i+1,ds=toDateStr(calYear,calMonth,d);
                  const di=itemsForDay(ds);
                  const hasConflict=di.some(it=>allConflictIds.has(it.id));
                  const isToday=ds===todayStr,isSel=ds===calDay;
                  return(
                    <div key={d} onClick={()=>setCalDay(isSel?null:ds)}
                      style={{textAlign:"center",padding:"7px 2px",borderRadius:6,cursor:"pointer",fontSize:13,fontFamily:"sans-serif",position:"relative",background:isSel?"#2c2416":isToday?"rgba(200,169,110,0.15)":"transparent",color:isSel?"#f5f0e8":"#2c2416",border:isToday?"2px solid #c8a96e":"2px solid transparent",fontWeight:isToday?"bold":"normal"}}>
                      {d}
                      {hasConflict&&<div style={{width:5,height:5,background:"#e07050",borderRadius:"50%",position:"absolute",bottom:3,left:"50%",transform:"translateX(-50%)"}}/>}
                      {!hasConflict&&di.length>0&&<div style={{width:4,height:4,background:"#c8a96e",borderRadius:"50%",position:"absolute",bottom:3,left:"50%",transform:"translateX(-50%)"}}/>}
                    </div>
                  );
                })}
              </div>
              <div style={{marginTop:10,display:"flex",gap:12,fontSize:11,fontFamily:"sans-serif",color:"#8a7a65"}}>
                <span style={{display:"flex",alignItems:"center",gap:4}}><span style={{width:8,height:8,background:"#c8a96e",borderRadius:"50%",display:"inline-block"}}/>Tasks</span>
                <span style={{display:"flex",alignItems:"center",gap:4}}><span style={{width:8,height:8,background:"#e07050",borderRadius:"50%",display:"inline-block"}}/>Conflict</span>
              </div>
            </div>
            <div style={{flex:1,minWidth:220}}>
              {calDay?(
                <React.Fragment>
                  <div style={{fontWeight:"bold",fontSize:16,marginBottom:4,fontFamily:"sans-serif"}}>{new Date(calDay+"T12:00:00").toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric"})}</div>
                  {selectedDayConflicts.size>0&&<div style={{background:"#fff0ee",border:"1px solid #e07050",borderRadius:7,padding:"8px 12px",marginBottom:12,fontSize:12,fontFamily:"sans-serif",color:"#c03020"}}>Time conflict: {selectedDayConflicts.size} tasks overlap.</div>}
                  {selectedDayItems.length===0&&<p style={{color:"#8a7a65",fontStyle:"italic",fontSize:14}}>No tasks scheduled.</p>}
                  {selectedDayItems.map((item,idx)=>(
                    <div key={item.id} style={{background:selectedDayConflicts.has(item.id)?"#fff5f3":"#fffdf7",border:"1px solid "+(selectedDayConflicts.has(item.id)?"#e07050":"#d4c5a9"),borderRadius:8,padding:"10px 14px",marginBottom:8,display:"flex",gap:10,alignItems:"flex-start"}}>
                      <div style={{fontFamily:"sans-serif",fontSize:13,color:"#c8a96e",fontWeight:"bold",minWidth:20}}>{idx+1}.</div>
                      <div style={{flex:1}}>
                        <div style={{fontSize:14,textDecoration:item.done?"line-through":"none",opacity:item.done?0.6:1}}>{item.text}</div>
                        <div style={{fontSize:11,color:"#8a7a65",marginTop:3,fontFamily:"sans-serif",display:"flex",gap:8,flexWrap:"wrap",alignItems:"center"}}>
                          <span style={{background:"#e8dfd0",borderRadius:3,padding:"1px 5px"}}>{sectionLabels[item.section]}</span>
                          {item.project&&<span>{"[P] "+item.project}</span>}
                          {item.time&&<span style={{background:selectedDayConflicts.has(item.id)?"#fde8e0":"#e8dfd0",borderRadius:4,padding:"1px 5px",color:selectedDayConflicts.has(item.id)?"#d04020":"#5a4a3a",fontWeight:selectedDayConflicts.has(item.id)?"bold":"normal"}}>{(selectedDayConflicts.has(item.id)?"(!) ":"")+fmt12(item.time)}</span>}
                        </div>
                      </div>
                      <div style={{display:"flex",gap:5}}>
                        <input type="checkbox" checked={item.done} onChange={()=>toggleDone(item.id)} style={{width:15,height:15,cursor:"pointer",accentColor:"#2c2416"}}/>
                        <button onClick={()=>openEdit(item)} style={mkBtn("#e8dfd0","#2c2416",{padding:"4px 8px",fontSize:11})}>Edit</button>
                      </div>
                    </div>
                  ))}
                </React.Fragment>
              ):<p style={{color:"#8a7a65",fontStyle:"italic",fontSize:14,marginTop:8}}>Select a day to see its tasks.</p>}
            </div>
          </div>
        )}

        {/* CALENDAR WEEK */}
        {view==="calendar"&&calMode==="week"&&(()=>{
          const ws=new Date(weekStart);
          const weekDays=Array(7).fill(null).map((_,i)=>{const d=new Date(ws);d.setDate(ws.getDate()+i);return d;});
          const prevWeek=()=>setWeekStart(w=>{const d=new Date(w);d.setDate(d.getDate()-7);return d;});
          const nextWeek=()=>setWeekStart(w=>{const d=new Date(w);d.setDate(d.getDate()+7);return d;});
          const goToday=()=>{const d=new Date();d.setDate(d.getDate()-d.getDay());setWeekStart(d);};
          const wLabel=weekDays[0].toLocaleDateString("en-US",{month:"short",day:"numeric"})+" - "+weekDays[6].toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"});
          return(
            <div>
              <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:16}}>
                <button onClick={prevWeek} style={mkBtn("#e8dfd0","#2c2416",{padding:"6px 12px"})}>Prev</button>
                <button onClick={goToday} style={mkBtn("#e8dfd0","#2c2416",{padding:"6px 12px",fontSize:12})}>Today</button>
                <span style={{fontWeight:"bold",fontSize:15,fontFamily:"sans-serif",flex:1,textAlign:"center"}}>{wLabel}</span>
                <button onClick={nextWeek} style={mkBtn("#e8dfd0","#2c2416",{padding:"6px 12px"})}>Next</button>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:8}}>
                {weekDays.map(dayObj=>{
                  const ds=toDateStr(dayObj.getFullYear(),dayObj.getMonth(),dayObj.getDate());
                  const isToday=ds===todayStr;
                  const di=itemsForDay(ds);
                  const dayConflicts=getConflicts(di);
                  const hasConflict=dayConflicts.size>0;
                  return(
                    <div key={ds} style={{background:"#fffdf7",border:"2px solid "+(hasConflict?"#e07050":isToday?"#c8a96e":"#e8dfd0"),borderRadius:10,minHeight:160,overflow:"hidden"}}>
                      <div style={{padding:"8px 10px",background:hasConflict?"#fff0ee":isToday?"rgba(200,169,110,0.15)":"#f5f0e8",borderBottom:"1px solid #e8dfd0",textAlign:"center"}}>
                        <div style={{fontSize:11,fontFamily:"sans-serif",color:hasConflict?"#c03020":"#8a7a65",textTransform:"uppercase",letterSpacing:0.5}}>{DAYS[dayObj.getDay()]+(hasConflict?" (!)":"")}</div>
                        <div style={{fontSize:18,fontWeight:isToday?"bold":"normal",fontFamily:"sans-serif"}}>{dayObj.getDate()}</div>
                      </div>
                      <div style={{padding:"6px 6px"}}>
                        {di.length===0&&<div style={{fontSize:11,color:"#c8c0b0",fontStyle:"italic",textAlign:"center",marginTop:8,fontFamily:"sans-serif"}}>-</div>}
                        {di.map(item=>{
                          const isConflict=dayConflicts.has(item.id);
                          return(
                            <div key={item.id} onClick={()=>openEdit(item)}
                              style={{background:isConflict?"#fff0ee":item.done?"#f0ebe0":(sectionColor[item.section]||"#c8a96e")+"18",
                                borderLeft:"3px solid "+(isConflict?"#e07050":sectionColor[item.section]||"#c8a96e"),
                                borderTop:"1px solid "+(isConflict?"#e07050":"#d4c5a9")+"40",
                                borderRight:"1px solid "+(isConflict?"#e07050":"#d4c5a9")+"40",
                                borderBottom:"1px solid "+(isConflict?"#e07050":"#d4c5a9")+"40",
                                borderRadius:5,padding:"5px 7px",marginBottom:4,cursor:"pointer",opacity:item.done?0.5:1}}>
                              <div style={{fontSize:11,fontFamily:"sans-serif",lineHeight:1.3,textDecoration:item.done?"line-through":"none",overflow:"hidden",display:"-webkit-box",WebkitLineClamp:2,WebkitBoxOrient:"vertical"}}>
                                {(isConflict?"(!) ":"")+item.text}
                              </div>
                              {item.time&&<div style={{fontSize:10,fontFamily:"sans-serif",marginTop:2,color:isConflict?"#d04020":"#8a7a65",fontWeight:isConflict?"bold":"normal"}}>{fmt12(item.time)}</div>}
                              {item.project&&<div style={{fontSize:10,color:"#8a7a65",fontFamily:"sans-serif",marginTop:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{"[P] "+item.project}</div>}
                            </div>
                          );
                        })}
                      </div>
                    </div>
                  );
                })}
              </div>
              <div style={{marginTop:12,display:"flex",gap:16,flexWrap:"wrap",alignItems:"center"}}>
                {Object.entries(sectionColor).filter(([s])=>s!=="trash").map(([s,c])=>(
                  <div key={s} style={{display:"flex",alignItems:"center",gap:4,fontSize:11,fontFamily:"sans-serif",color:"#5a4a3a"}}>
                    <div style={{width:10,height:10,background:c,borderRadius:2}}/>
                    {sectionLabels[s]}
                  </div>
                ))}
                <div style={{display:"flex",alignItems:"center",gap:4,fontSize:11,fontFamily:"sans-serif",color:"#c03020"}}>
                  <div style={{width:10,height:10,background:"#e07050",borderRadius:2}}/>
                  Time Conflict
                </div>
              </div>
            </div>
          );
        })()}

        {/* REVIEW */}
        {view==="review"&&(
          <div>
            <p style={{color:"#5a4a3a",lineHeight:1.7,marginBottom:24}}>Your weekly review keeps the GTD system trustworthy.</p>
            {[
              {title:"1. Collect loose papers & materials",desc:"Gather any physical notes and add them to your In Basket."},
              {title:"2. Empty your In Basket",desc:"You have "+stats.inbox+" item(s). Clarify each one.",action:()=>setView("inbox"),label:"Go to In Basket"},
              {title:"3. Review Less than 2min",desc:stats.twomin+" quick tasks pending. Do them now!",action:()=>setView("twomin"),label:"Go to 2min"},
              {title:"4. Review Deferred & Delegated",desc:"Check what has been deferred or delegated.",action:()=>setView("defer"),label:"Go to Defer"},
              {title:"5. Review Projects",desc:"Ensure every project has at least one next action.",action:()=>setView("projects"),label:"Go to Projects"},
              {title:"6. Review Someday/Maybe",desc:"Decide what to activate, delete, or keep.",action:()=>setView("someday"),label:"Go to Someday"},
              {title:"7. Be creative & courageous",desc:"Any new ideas? Capture them in your In Basket."},
            ].map((step,i)=>(
              <div key={i} style={{background:"#fffdf7",border:"1px solid #d4c5a9",borderRadius:8,padding:"16px 20px",marginBottom:12}}>
                <div style={{fontWeight:"bold",fontSize:15,marginBottom:4}}>{step.title}</div>
                <div style={{fontSize:14,color:"#5a4a3a",lineHeight:1.6}}>{step.desc}</div>
                {step.action&&<button onClick={step.action} style={{...mkBtn("#2c2416"),marginTop:10}}>{step.label}</button>}
              </div>
            ))}
          </div>
        )}
      </div>

      {/* CLARIFY MODAL */}
      {clarifyItem&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.45)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:100}}>
          <div style={{background:"#fffdf7",borderRadius:12,padding:28,width:480,maxWidth:"95vw",boxShadow:"0 8px 40px rgba(0,0,0,0.2)",maxHeight:"90vh",overflowY:"auto"}}>
            <h3 style={{margin:"0 0 14px",fontSize:18}}>Clarify Item</h3>
            <input value={clarify.text} onChange={e=>setClarify(c=>({...c,text:e.target.value}))} style={{...fieldStyle,fontFamily:"Georgia,serif",fontSize:14,padding:"10px 12px",marginBottom:16}}/>
            <div style={{marginBottom:14}}>
              <div style={{fontSize:13,fontFamily:"sans-serif",color:"#5a4a3a",marginBottom:8,fontWeight:"bold"}}>Is it actionable?</div>
              <div style={{display:"flex",gap:10}}>
                {["Yes","No"].map(v=>(
                  <button key={v} onClick={()=>setClarify(c=>({...c,actionable:v==="Yes"}))}
                    style={{flex:1,padding:"9px",border:"2px solid "+(clarify.actionable===(v==="Yes")?"#2c2416":"#d4c5a9"),borderRadius:7,background:clarify.actionable===(v==="Yes")?"#2c2416":"#f5f0e8",color:clarify.actionable===(v==="Yes")?"#f5f0e8":"#2c2416",cursor:"pointer",fontSize:14,fontFamily:"sans-serif"}}>{v}</button>
                ))}
              </div>
            </div>
            {clarify.actionable===false&&(
              <div style={{marginBottom:14}}>
                <div style={{fontSize:13,fontFamily:"sans-serif",color:"#5a4a3a",marginBottom:8,fontWeight:"bold"}}>Send to:</div>
                <div style={{display:"flex",gap:8}}>
                  {["reference","someday","trash"].map(s=>(
                    <button key={s} onClick={()=>setClarify(c=>({...c,naSection:s}))}
                      style={{flex:1,padding:"8px",border:"2px solid "+(clarify.naSection===s?"#2c2416":"#d4c5a9"),borderRadius:7,background:clarify.naSection===s?"#2c2416":"#f5f0e8",color:clarify.naSection===s?"#f5f0e8":"#2c2416",cursor:"pointer",fontSize:13,fontFamily:"sans-serif"}}>
                      {s==="reference"?"Reference":s==="someday"?"Someday":"Trash"}
                    </button>
                  ))}
                </div>
              </div>
            )}
            {clarify.actionable===true&&(
              <React.Fragment>
                <div style={{marginBottom:14}}>
                  <label style={{display:"flex",alignItems:"center",gap:10,cursor:"pointer",fontSize:14,background:"#fff8e8",border:"1px solid #c8a96e",borderRadius:7,padding:"10px 14px"}}>
                    <input type="checkbox" checked={clarify.twoMin} onChange={e=>setClarify(c=>({...c,twoMin:e.target.checked}))} style={{width:16,height:16,accentColor:"#2c2416"}}/>
                    <span>Takes less than 2 minutes</span>
                  </label>
                </div>
                {!clarify.twoMin&&(
                  <div style={{marginBottom:14}}>
                    <div style={{fontSize:13,fontFamily:"sans-serif",color:"#5a4a3a",marginBottom:8,fontWeight:"bold"}}>Send to:</div>
                    <div style={{display:"flex",gap:10}}>
                      {["defer","delegate"].map(s=>(
                        <button key={s} onClick={()=>setClarify(c=>({...c,destination:s}))}
                          style={{flex:1,padding:"9px",border:"2px solid "+(clarify.destination===s?"#2c2416":"#d4c5a9"),borderRadius:7,background:clarify.destination===s?"#2c2416":"#f5f0e8",color:clarify.destination===s?"#f5f0e8":"#2c2416",cursor:"pointer",fontSize:14,fontFamily:"sans-serif"}}>
                          {s==="defer"?"Defer":"Delegate"}
                        </button>
                      ))}
                    </div>
                  </div>
                )}
                <div style={{display:"flex",gap:12,marginBottom:12}}>
                  <div style={{flex:1}}>
                    <label style={labelStyle}>Context</label>
                    <select value={clarify.context} onChange={e=>setClarify(c=>({...c,context:e.target.value}))} style={fieldStyle}>
                      {CONTEXTS.map(ctx=><option key={ctx}>{ctx}</option>)}
                    </select>
                  </div>
                  <div style={{flex:1}}>
                    <label style={labelStyle}>Project (optional)</label>
                    <input value={clarify.project} onChange={e=>setClarify(c=>({...c,project:e.target.value}))} list="proj-list" placeholder="Assign project..." style={fieldStyle}/>
                    <datalist id="proj-list">{data.projects.map(p=><option key={p.id} value={p.name}/>)}</datalist>
                  </div>
                </div>
                <div style={{display:"flex",gap:12,marginBottom:16}}>
                  <div style={{flex:1}}>
                    <label style={labelStyle}>Due date (optional)</label>
                    <input type="date" value={clarify.due} onChange={e=>setClarify(c=>({...c,due:e.target.value}))} style={fieldStyle}/>
                  </div>
                  <div style={{flex:1}}>
                    <label style={labelStyle}>Time (optional)</label>
                    <TimePicker value={clarify.time||""} onChange={t=>setClarify(c=>({...c,time:t}))}/>
                  </div>
                </div>
              </React.Fragment>
            )}
            <div style={{display:"flex",gap:10}}>
              <button onClick={()=>setClarifyItem(null)} style={mkBtn("#e8dfd0","#2c2416")}>Cancel</button>
              <button onClick={applyClarify} style={{...mkBtn("#2c2416"),flex:2}}>Confirm</button>
            </div>
          </div>
        </div>
      )}

      {/* EDIT MODAL */}
      {editItem&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.45)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:100}}>
          <div style={{background:"#fffdf7",borderRadius:12,padding:28,width:480,maxWidth:"95vw",boxShadow:"0 8px 40px rgba(0,0,0,0.2)",maxHeight:"90vh",overflowY:"auto"}}>
            <h3 style={{margin:"0 0 16px",fontSize:18}}>Edit Item</h3>
            <EditFields form={editForm} setForm={setEditForm} showSection={editItem.section!=="inbox"} projects={data.projects}/>
            {["twomin","defer","delegate"].includes(editForm.section)&&(
              <div style={{marginBottom:14}}>
                <label style={{display:"flex",alignItems:"center",gap:8,cursor:"pointer",fontSize:13,fontFamily:"sans-serif"}}>
                  <input type="checkbox" checked={editForm.done} onChange={e=>setEditForm(f=>({...f,done:e.target.checked}))} style={{width:15,height:15,accentColor:"#2c2416"}}/>
                  Mark as done
                </label>
              </div>
            )}
            <div style={{display:"flex",gap:10,marginTop:8}}>
              <button onClick={()=>setEditItem(null)} style={mkBtn("#e8dfd0","#2c2416")}>Cancel</button>
              <button onClick={applyEdit} style={{...mkBtn("#2c2416"),flex:2}}>Save Changes</button>
            </div>
          </div>
        </div>
      )}

      {/* ADD TASK MODAL */}
      {addTaskModal&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.45)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:100}}>
          <div style={{background:"#fffdf7",borderRadius:12,padding:28,width:480,maxWidth:"95vw",boxShadow:"0 8px 40px rgba(0,0,0,0.2)",maxHeight:"90vh",overflowY:"auto"}}>
            <h3 style={{margin:"0 0 16px",fontSize:18}}>Add Task to Project</h3>
            <EditFields form={taskForm} setForm={setTaskForm} showSection={true} projects={data.projects}/>
            <div style={{display:"flex",gap:10,marginTop:8}}>
              <button onClick={()=>setAddTaskModal(null)} style={mkBtn("#e8dfd0","#2c2416")}>Cancel</button>
              <button onClick={applyAddTask} style={{...mkBtn("#2c2416"),flex:2}}>Add Task</button>
            </div>
          </div>
        </div>
      )}

      {toast&&<div style={{position:"fixed",bottom:28,left:"50%",transform:"translateX(-50%)",background:"#2c2416",color:"#f5f0e8",padding:"12px 24px",borderRadius:30,fontSize:14,fontFamily:"sans-serif",boxShadow:"0 4px 20px rgba(0,0,0,0.2)",zIndex:200}}>{toast}</div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
